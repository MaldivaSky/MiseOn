services:
  miseon-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host"
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env.local

volumes:
  node_modules:
