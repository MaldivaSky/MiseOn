<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  @keyframes vScene { 0% { opacity:0; } 3% { opacity:1; } 90% { opacity:1; } 98%,100% { opacity:0; } }
  @keyframes vBase  { 0% { transform: translate(-42vw,26vh) rotate(12deg) scale(1.12); opacity:0; filter:blur(9px); } 6% { opacity:0; } 30% { transform:none; opacity:1; filter:blur(0); } 100% { transform:none; opacity:1; } }
  @keyframes vShaft { 0% { transform: translate(0,42vh) rotate(9deg) scale(1.12); opacity:0; filter:blur(9px); } 8% { opacity:0; } 32% { transform:none; opacity:1; filter:blur(0); } 100% { transform:none; opacity:1; } }
  @keyframes vHat   { 0% { transform: translate(0,-40vh) rotate(-13deg) scale(1.12); opacity:0; filter:blur(9px); } 10% { opacity:0; } 34% { transform:none; opacity:1; filter:blur(0); } 100% { transform:none; opacity:1; } }
  @keyframes vHead  { 0% { transform: translate(40vw,-30vh) rotate(20deg) scale(1.12); opacity:0; filter:blur(9px); } 12% { opacity:0; } 36% { transform:none; opacity:1; filter:blur(0); } 100% { transform:none; opacity:1; } }
  @keyframes vPunch { 0%,32% { transform:scale(1); } 37% { transform:scale(1.07); } 43% { transform:scale(.99); } 49%,100% { transform:scale(1); } }
  @keyframes vShine { 0%,37% { transform:translateX(-170%) skewX(-16deg); } 54% { transform:translateX(330%) skewX(-16deg); } 100% { transform:translateX(330%) skewX(-16deg); } }
  @keyframes vSpot  { 0%,34% { opacity:0; transform:scale(.7); } 46% { opacity:.9; transform:scale(1.05); } 70% { opacity:.6; } 90% { opacity:.6; } 100% { opacity:.6; } }
  @keyframes vFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes vWord  { 0%,56% { opacity:0; transform:translateY(20px); letter-spacing:.55em; } 67% { opacity:1; transform:none; letter-spacing:.13em; } 100% { opacity:1; letter-spacing:.13em; } }
  @keyframes vLine  { 0%,60% { transform:scaleX(0); opacity:0; } 70% { transform:scaleX(1); opacity:1; } 100% { transform:scaleX(1); opacity:1; } }
  @keyframes vTag   { 0%,67% { opacity:0; transform:translateY(10px); } 77% { opacity:1; transform:none; } 100% { opacity:1; } }
  @keyframes grain  { 0%,100% { transform:translate(0,0); } 25% { transform:translate(-3%,2%); } 50% { transform:translate(2%,-3%); } 75% { transform:translate(-2%,-2%); } }
</style>
</helmet>
<div ref="{{ spdRef }}" style="--spd:1; position:relative; width:1280px; height:720px; background:radial-gradient(130% 130% at 50% 36%, #0C1730 0%, #060B18 60%, #03060E 100%); overflow:hidden; font-family:'Sora',sans-serif; color:#EAF0FA;">

  <!-- textura / vinheta -->
  <div style="position:absolute; inset:-6%; background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size:30px 30px; opacity:.5; mask-image:radial-gradient(620px 460px at 50% 42%, #000, transparent 76%); animation:grain 6s steps(4) infinite; pointer-events:none;"></div>
  <div style="position:absolute; inset:0; box-shadow:inset 0 0 260px rgba(0,0,0,.85); pointer-events:none;"></div>

  <div key="{{ playKey }}" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; animation:vScene calc(7s * var(--spd)) linear infinite;">

    <!-- símbolo -->
    <div style="position:relative; width:300px; height:300px; margin-top:-24px;">
      <!-- spotlight de encaixe -->
      <div style="position:absolute; inset:-20px; border-radius:50%; background:radial-gradient(circle, rgba(30,99,201,.42), rgba(252,91,36,.14) 44%, transparent 66%); filter:blur(16px); animation:vSpot calc(7s * var(--spd)) ease-out infinite;"></div>
      <div style="position:absolute; inset:0; animation:vFloat calc(6s * var(--spd)) ease-in-out infinite;">
        <div style="position:absolute; inset:0; animation:vPunch calc(7s * var(--spd)) cubic-bezier(.34,1.4,.5,1) infinite; filter:drop-shadow(0 18px 40px rgba(0,0,0,.6));">
          <img src="part-mbase.png"      style="position:absolute; inset:0; width:100%; height:100%; object-fit:contain; animation:vBase  calc(7s * var(--spd)) cubic-bezier(.16,1,.3,1) infinite;">
          <img src="part-arrowshaft.png" style="position:absolute; inset:0; width:100%; height:100%; object-fit:contain; animation:vShaft calc(7s * var(--spd)) cubic-bezier(.16,1,.3,1) infinite;">
          <img src="part-hat.png"        style="position:absolute; inset:0; width:100%; height:100%; object-fit:contain; animation:vHat   calc(7s * var(--spd)) cubic-bezier(.16,1,.3,1) infinite;">
          <img src="part-arrowhead.png"  style="position:absolute; inset:0; width:100%; height:100%; object-fit:contain; animation:vHead  calc(7s * var(--spd)) cubic-bezier(.16,1,.3,1) infinite;">
        </div>
        <!-- brilho especular na forma da marca -->
        <div style="position:absolute; inset:0; -webkit-mask-image:url('icon-clean.png'); mask-image:url('icon-clean.png'); -webkit-mask-size:contain; mask-size:contain; -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat; -webkit-mask-position:center; mask-position:center; overflow:hidden; pointer-events:none;">
          <div style="position:absolute; top:-25%; left:0; width:42%; height:150%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent); animation:vShine calc(7s * var(--spd)) ease-in-out infinite;"></div>
        </div>
      </div>
    </div>

    <!-- marca -->
    <div style="text-align:center; margin-top:14px;">
      <div style="font-weight:800; font-size:52px; letter-spacing:.13em; animation:vWord calc(7s * var(--spd)) ease-out infinite;"><span style="color:#0A5CC4;">MISE</span> <span style="color:#FC5B24;">ON</span></div>
      <div style="height:2px; width:250px; margin:18px auto 15px; background:linear-gradient(90deg,transparent,#FC5B24,transparent); transform-origin:center; animation:vLine calc(7s * var(--spd)) ease-out infinite;"></div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:.34em; color:#9AA7C0; text-transform:uppercase; animation:vTag calc(7s * var(--spd)) ease-out infinite;">Sistema inteligente para sua cozinha</div>
    </div>
  </div>

  <!-- controles -->
  <div style="position:absolute; bottom:22px; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:16px;">
    <button onClick="{{ replay }}" style="font-family:'Manrope',sans-serif; font-weight:600; font-size:13px; color:#EAF0FA; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:9px; padding:9px 16px; cursor:pointer;" style-hover="background:rgba(255,255,255,.16);">↻ Reproduzir</button>
    <span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#5E6C88; letter-spacing:.12em;">ABERTURA DE MARCA · 7s · LOOP</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:720},&quot;velocidade&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1.1,&quot;min&quot;:0.5,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;unit&quot;:&quot;×&quot;,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { playKey: 0 };
    this.spdRef = React.createRef();
  }
  componentDidMount() { this.applySpd(); }
  componentDidUpdate() { this.applySpd(); }
  applySpd() {
    if (this.spdRef.current) this.spdRef.current.style.setProperty('--spd', 1 / (this.props.velocidade ?? 1));
  }
  renderVals() {
    return {
      playKey: this.state.playKey,
      spdRef: this.spdRef,
      replay: () => this.setState(s => ({ playKey: s.playKey + 1 })),
    };
  }
}
</script>
</body>
</html>
