<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#f97316" />

    <!-- Favicon para Google Search & Navegadores -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="shortcut icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <!-- Open Graph / Google & Redes Sociais -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MiseOn" />
    <meta property="og:title" content="MiseOn — Sistema Inteligente para sua Cozinha" />
    <meta property="og:description" content="Sistema completo para restaurantes, hamburguerias, lanchonetes e pizzarias. PDV, KDS, cardápio QR Code, iFood e WhatsApp IA." />
    <meta property="og:image" content="https://miseon.app.br/icon-512.png" />
    <meta property="og:url" content="https://miseon.app.br/" />

    <!-- Dados Estruturados Schema.org para o Google (Organização e Logotipo) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MiseOn",
        "url": "https://miseon.app.br",
        "logo": "https://miseon.app.br/icon-512.png"
      }
    </script>

    <meta name="description" content="MiseOn - Sistema Inteligente para sua Cozinha. Cardápio digital, pedidos, entrega e estoque." />
    <title>MiseOn — Sistema Inteligente para sua Cozinha</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
